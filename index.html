<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #111820;
  --surface:  #18222e;
  --surface2: #1e2d3d;
  --border:   #2a3d52;
  --accent:   #fee715;
  --accent-dk:#c9b800;
  --text:     #f0eedc;
  --text-dim: #7a8fa6;
  --today:    #fee715;
  --soon:     #ffb020;
  --later:    #4db8ff;
  --past:     #4a5c6e;
  --idn:      #e63946;
  --eng:      #4db8ff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 10% 10%, rgba(254,231,21,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 90%, rgba(77,184,255,0.04) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

#view-main {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  position: relative; z-index: 1;
}

.top-bar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(17,24,32,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  gap: 12px;
}
@media (min-width: 600px) { .top-bar { padding: 0 30px; height: 72px; } }

.top-bar-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.top-bar-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 3px;
  color: var(--accent);
  white-space: nowrap;
}
@media (min-width: 600px) { .top-bar-title { font-size: 32px; } }

.top-bar-date {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.5;
  display: none;
}
@media (min-width: 640px) { .top-bar-date { display: block; } }

/* LANG TOGGLE */
.lang-toggle {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px;
  overflow: hidden;
  flex-shrink: 0;
}
.lang-btn {
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  padding: 7px 13px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.lang-btn.active { background: var(--accent); color: #111820; }
.lang-btn:hover:not(.active) { color: var(--text); }

.main-body {
  flex: 1;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
@media (min-width: 768px) { .main-body { padding: 20px 30px; gap: 16px; } }

/* STATS */
.stats-row {
  display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0;
  animation: fadeUp 0.5s 0.05s both;
}
.stat-chip {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; padding: 5px 12px;
  font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dim);
}
.stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* MANGA GRID */
.manga-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  align-content: start;
  padding-bottom: 32px;
}
@media (min-width: 540px)  { .manga-list { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 768px)  { .manga-list { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; } }
@media (min-width: 1200px) { .manga-list { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); } }

/* MANGA CARD */
.manga-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  animation: cardIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
  display: flex;
  flex-direction: column;
  user-select: none;
}
.manga-card:hover { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(0,0,0,0.4); }
.manga-card.urgent     { border-color: rgba(254,231,21,0.6); box-shadow: 0 4px 14px rgba(254,231,21,0.1); }
.manga-card.soon-card  { border-color: rgba(255,176,32,0.5); }
.manga-card.later-card { border-color: rgba(77,184,255,0.3); }
.manga-card.past-card  { border-color: rgba(74,92,110,0.4); opacity: 0.7; }

.card-bar { height: 4px; flex-shrink: 0; }
.urgent .card-bar    { background: var(--today); }
.soon-card .card-bar { background: var(--soon); }
.later-card .card-bar{ background: var(--later); }
.past-card .card-bar { background: var(--past); }

.card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 7px; }
@media (min-width: 600px) { .card-body { padding: 14px 16px; gap: 8px; } }

.card-top-row { display: flex; align-items: center; justify-content: space-between; }
.manga-rank { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dim); }

.flag-badges { display: flex; gap: 4px; }
.flag-badge {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 7px;
  border-radius: 100px;
}
.flag-badge.id { background: rgba(230,57,70,0.15); color: var(--idn); border: 1px solid rgba(230,57,70,0.35); }
.flag-badge.en { background: rgba(77,184,255,0.15); color: var(--eng); border: 1px solid rgba(77,184,255,0.3); }

.manga-title-wrap { text-decoration: none; display: flex; align-items: flex-start; gap: 4px; }
.manga-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.5px;
  line-height: 1.15;
  color: var(--text);
  transition: color 0.2s;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  word-break: break-word;
}
@media (min-width: 600px) { .manga-title { font-size: 23px; } }
.manga-title-wrap:hover .manga-title { color: var(--accent); }
.manga-title.no-link { color: var(--text-dim); cursor: default; }
.link-arrow { font-size: 9px; color: var(--accent); opacity: 0; flex-shrink: 0; transition: opacity 0.2s; margin-top: 3px; }
.manga-title-wrap:hover .link-arrow { opacity: 1; }

.manga-date-display { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
.date-day-num { font-family: 'Bebas Neue', sans-serif; color: var(--text); line-height: 1; text-align: center; min-width: 32px; }
.date-month-year { font-family: 'Space Mono', monospace; display: flex; flex-direction: column; }
.date-month { font-weight: 700; font-size: 12px; }
.date-year  { color: var(--text-dim); font-size: 10px; }

.urgent .date-day-num, .urgent .date-month        { color: var(--today); }
.soon-card .date-day-num, .soon-card .date-month   { color: var(--soon); }
.later-card .date-day-num, .later-card .date-month { color: var(--later); }
.past-card .date-day-num, .past-card .date-month   { color: var(--past); }

.badge-days {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 0.5px;
  padding: 4px 9px;
  border-radius: 100px;
  white-space: nowrap;
  margin-left: auto;
}
.urgent    .badge-days { background: rgba(254,231,21,0.15); color: var(--today); border: 1px solid rgba(254,231,21,0.4); }
.soon-card .badge-days { background: rgba(255,176,32,0.15); color: var(--soon);  border: 1px solid rgba(255,176,32,0.4); }
.later-card .badge-days{ background: rgba(77,184,255,0.15);  color: var(--later); border: 1px solid rgba(77,184,255,0.3); }
.past-card  .badge-days{ background: rgba(74,92,110,0.15);  color: var(--past);  border: 1px solid rgba(74,92,110,0.3); }

.empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--text-dim); }
.empty-icon { font-size: 54px; margin-bottom: 14px; opacity: 0.3; }
.empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes cardIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

/* LANG PICKER OVERLAY */
#lang-picker {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.4s ease, visibility 0.4s;
}
#lang-picker.hide {
  opacity: 0; visibility: hidden; pointer-events: none;
}
.lp-box {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  animation: fadeUp 0.5s 0.1s ease both;
}
.lp-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px; letter-spacing: 4px; color: var(--accent);
  margin-bottom: 4px;
}
.lp-sub {
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--text-dim);
  letter-spacing: 1px; margin-bottom: 28px; text-align: center;
}
.lp-buttons { display: flex; gap: 16px; }
.lp-btn {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  padding: 20px 32px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; cursor: pointer;
  font-family: 'Space Mono', monospace; font-size: 13px;
  font-weight: 700; letter-spacing: 1px; color: var(--text);
  transition: all 0.2s; min-width: 120px;
}
.lp-btn img { width: 44px; height: 29px; object-fit: fill; border-radius: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
.lp-btn:hover { border-color: var(--accent); background: var(--surface2); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(254,231,21,0.1); }
@media (max-width: 400px) { .lp-btn { padding: 16px 22px; min-width: 100px; } .lp-buttons { gap: 12px; } }

/* CALENDAR BUTTON */
.calendar-btn {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; padding: 5px 12px;
  font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
}
.calendar-btn:hover { border-color: var(--accent); color: var(--accent); }
.calendar-btn .cal-icon { font-size: 13px; line-height: 1; }

/* CALENDAR MODAL */
#calendar-modal {
  position: fixed; inset: 0; z-index: 9998;
  background: rgba(8,12,18,0.78);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
  padding: 16px;
}
#calendar-modal.show { opacity: 1; visibility: visible; }
.cal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px;
  width: 100%; max-width: 380px; max-height: 90vh; overflow-y: auto;
  animation: fadeUp 0.3s ease both;
}
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 8px; }
.cal-title-wrap { display: flex; align-items: center; gap: 10px; }
.cal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent); min-width: 130px; text-align: center; }
.cal-nav { display: flex; gap: 6px; align-items: center; }
.cal-nav-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  font-family: 'Space Mono', monospace;
}
.cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.cal-close {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  width: 30px; height: 30px; border-radius: 8px; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
}
.cal-close:hover { border-color: var(--idn); color: var(--idn); }
.cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 6px; }
.cal-weekday { text-align: center; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; color: var(--text-dim); padding: 4px 0; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.cal-day {
  aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text);
  border: 1px solid transparent; gap: 2px; transition: background 0.15s, border-color 0.15s;
}
.cal-day.empty { visibility: hidden; }
.cal-day.is-today { border-color: var(--accent); font-weight: 700; color: var(--accent); }
.cal-day.has-manga { cursor: pointer; background: rgba(255,255,255,0.02); }
.cal-day.has-manga:hover { background: var(--surface2); border-color: var(--border); }
.cal-day.selected { background: var(--surface2); border-color: var(--accent); }
.cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 30px; }
.cal-dot { width: 6px; height: 6px; border-radius: 50%; box-sizing: border-box; }
.cal-legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-dim); }
.cal-legend-item { display: flex; align-items: center; gap: 4px; }
.cal-legend-dot { width: 8px; height: 8px; border-radius: 50%; box-sizing: border-box; flex-shrink: 0; }
.cal-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
.cal-detail.show { display: block; animation: fadeUp 0.25s ease both; }
.cal-detail-date { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; color: var(--accent); margin-bottom: 8px; }
.cal-detail-item { padding: 7px 8px; font-size: 12.5px; margin-bottom: 6px; background: var(--surface2); border-radius: 6px; }
.cal-detail-item:last-child { margin-bottom: 0; }
.cal-detail-item a { color: var(--text); text-decoration: none; }
.cal-detail-item a:hover { color: var(--accent); }
.cal-detail-item .no-link { color: var(--text-dim); }
.cal-detail-approx { color: var(--text-dim); font-size: 10px; }

/* EDGE (AWAL/TENGAH/AKHIR) MARKERS */
.cal-day.cal-edge {
  background: rgba(254,231,21,0.04);
  border: 1px dashed var(--border);
}
.cal-day.cal-edge .cal-edge-label {
  font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.5px;
  color: var(--text-dim); text-transform: uppercase; text-align: center; line-height: 1.1;
}
.cal-day.cal-edge:hover { border-color: var(--accent); }
.cal-day.cal-edge.selected { border-color: var(--accent); background: var(--surface2); }
.cal-day.cal-edge.selected .cal-edge-label { color: var(--accent); }

</style>
</head>

    <div class="lp-buttons">

    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-legend" id="cal-legend"></div>
    <div class="cal-detail" id="cal-detail"></div>
  </div>
</div>

  },
  en: {
    ms: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    wd: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
    today: 'TODAY!', ongoing: 'ONGOING!', tomorrow: 'Tomorrow',
    ago: d => `${d} day${d>1?'s':''} ago`, left: d => `in ${d} day${d>1?'s':''}`,
    s_today:'Today', s_soon:'Soon', s_later:'Upcoming', s_past:'Past', s_total:'TOTAL',
    day_early:'Early', day_mid:'Mid', day_end:'End',
    cal_btn:'CALENDAR', cal_approx:'Approx.', cal_empty:'No releases on this date',
  },
};

function setLang(l) {
  lang = l;
  document.getElementById('btn-lang-id').classList.toggle('active', l==='id');
  document.getElementById('btn-lang-en').classList.toggle('active', l==='en');
  updateHeaderDate();
  render();
  if(document.getElementById('calendar-modal').classList.contains('show')) renderCalendar();
}

// ================== DATE HELPERS ==================
function daysInMonth(m, y) { return new Date(y, m, 0).getDate(); } // m is 1-indexed

function getApproxRange(m) {
  let startD = parseInt(m.dayStr);
  let endD = startD;
  let isRange = false;
  let rangeLabel = '';
  const lastDay = daysInMonth(m.month, m.year);

  if (isNaN(startD)) {
    const s = (m.dayStr || '').toLowerCase();
    isRange = true;
    if (s.includes('awal') || s.includes('early')) {
      startD = 1; endD = 10; rangeLabel = 'awal';
    } else if (s.includes('tengah') || s.includes('mid')) {
      startD = 11; endD = 19; rangeLabel = 'tengah';
    } else if (s.includes('akhir') || s.includes('end')) {
      startD = 20; endD = lastDay; rangeLabel = 'akhir';
    } else if (s.includes('-')) {
      const parts = s.split('-');
      startD = parseInt(parts[0]) || 1;
      endD = parseInt(parts[1]) || lastDay;
      rangeLabel = 'custom';
    } else {
      startD = 15; endD = 15; isRange = false;
    }
  }
  startD = Math.max(1, Math.min(startD, lastDay));
  endD = Math.max(startD, Math.min(endD, lastDay));

  return {
    startD, endD,
    startDate: new Date(m.year, m.month - 1, startD),
    endDate: new Date(m.year, m.month - 1, endD),
    isRange, rangeLabel
  };
}

function getSortDate(m) {
  return getApproxRange(m).startDate;
}

function daysUntil(m) {
  const range = getApproxRange(m);
  const now = new Date(); now.setHours(0,0,0,0);
  const tStart = range.startDate.getTime();
  const tEnd = range.endDate.getTime();
  const tNow = now.getTime();

  if (tNow < tStart) {
    return Math.round((tStart - tNow) / 86400000); // positif: hari menuju periode rilis
  } else if (tNow >= tStart && tNow <= tEnd) {
    return 0; // nol: saat ini sedang berada di dalam periode rentang!
  } else {
    return Math.round((tEnd - tNow) / 86400000); // negatif: hari sejak periode rilis berakhir
  }
}

function daysLabel(days, m) {
  const t = T[lang];
  if(days < 0) return t.ago(Math.abs(days));
  if(days === 0) {
    const r = getApproxRange(m);
    // jika berupa rentang hari yang aktif (bukan sekedar tanggal spesifik)
    return (r.isRange && r.startD !== r.endD) ? t.ongoing : t.today;
  }
  if(days === 1) return t.tomorrow;
  return t.left(days);
}

function urgencyClass(days) {
  if(days < 0) return 'past-card';
  if(days === 0) return 'urgent';
  if(days <= 3) return 'soon-card';
  return 'later-card';
}

function parseDayDisplay(m) {
  const t = T[lang];
  const range = getApproxRange(m);
  let topText = m.dayStr || '?';
  let subText = '';

  // Terjemahkan topText sesuai bahasa ("Awal" -> "Awal" atau "Early")
  const sl = topText.toLowerCase();
  if (sl.includes('awal') || sl.includes('early')) topText = t.day_early;
  else if (sl.includes('tengah') || sl.includes('mid')) topText = t.day_mid;
  else if (sl.includes('akhir') || sl.includes('end')) topText = t.day_end;

  // Jika ini adalah rentang yang punya label (Awal/Tengah/Akhir/dll)
  if (range.isRange && range.rangeLabel !== 'custom' && range.startD !== range.endD) {
    subText = `${range.startD}-${range.endD}`;
  }

  if (subText) {
    // Tampilan susun: "Awal" di atas, "1-10" di bawah
    return `
    <div class="date-day-num" style="display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1;">
      <span style="font-size:20px; line-height:1.1;">${escHtml(topText)}</span>
      <span style="font-size:11px; font-family:'Space Mono', monospace; opacity:0.8; margin-top:2px; font-weight:700;">${escHtml(subText)}</span>
    </div>`;
  }

  // Fallback untuk tanggal biasa
  const len = topText.length;
  let fs='32px', lh='1', wb='normal';
  if(len>8){fs='12px';lh='1.2';wb='break-word';}
  else if(len>5){fs='15px';lh='1.1';}
  else if(len>4){fs='18px';}
  else if(len>3){fs='20px';}
  else if(len>2){fs='26px';}
  return `<div class="date-day-num" style="font-size:${fs};line-height:${lh};word-break:${wb};">${escHtml(topText)}</div>`;
}

function translateDayStr(dayStr, m) {
  const t = T[lang];
  const sl = (dayStr || '').toLowerCase();
  const r = getApproxRange(m);
  if (sl.includes('awal') || sl.includes('early')) return `${t.day_early} (${r.startD}-${r.endD})`;
  if (sl.includes('tengah') || sl.includes('mid')) return `${t.day_mid} (${r.startD}-${r.endD})`;
  if (sl.includes('akhir') || sl.includes('end')) return `${t.day_end} (${r.startD}-${r.endD})`;
  return dayStr;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ================== RENDER ==================
function render() {
  const list = document.getElementById('manga-list');
  const statsEl = document.getElementById('stats-bar');
  const t = T[lang];
  const sorted = [...MANGA_DATA].sort((a,b) => getSortDate(a) - getSortDate(b));

  let cT=0, cS=0, cL=0, cP=0;
  sorted.forEach(m => {
    const d = daysUntil(m);
    if (d < 0) cP++; 
    else if (d === 0) cT++; 
    else if (d <= 3) cS++; 
    else cL++;
  });

  statsEl.innerHTML=`
    <div class="stat-chip"><span class="stat-dot" style="background:var(--today)"></span>${cT} ${t.s_today}</div>
    <div class="stat-chip"><span class="stat-dot" style="background:var(--soon)"></span>${cS} ${t.s_soon}</div>
    <div class="stat-chip"><span class="stat-dot" style="background:var(--later)"></span>${cL} ${t.s_later}</div>
    <div class="stat-chip"><span class="stat-dot" style="background:var(--past)"></span>${cP} ${t.s_past}</div>
    <div class="stat-chip" style="margin-left:auto;font-weight:700;">${sorted.length} ${t.s_total}</div>
    <div class="calendar-btn" onclick="openCalendar()"><span class="cal-icon">📅</span>${t.cal_btn}</div>
  `;

  if(!sorted.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-title">No Manga</div></div>`;
    return;
  }

  list.innerHTML = sorted.map((m,i)=>{
    const days=daysUntil(m), urg=urgencyClass(days), lbl=daysLabel(days, m);
    const flags=(m.flags||['id']);
    const flagsHtml=flags.map(f=>`<span class="flag-badge ${f}">${f==='id'?'IDN':'ENG'}</span>`).join('');
    const titleHtml=m.link
      ?`<a class="manga-title-wrap" href="${escHtml(m.link)}" target="_blank" rel="noopener"><span class="manga-title">${escHtml(m.title)}</span><span class="link-arrow">↗</span></a>`
      :`<span class="manga-title no-link">${escHtml(m.title)}</span>`;
    return `
    <div class="manga-card ${urg}" style="animation-delay:${i*0.03}s">
      <div class="card-bar"></div>
      <div class="card-body">
        <div class="card-top-row">
          <div class="manga-rank">#${String(i+1).padStart(2,'0')}</div>
          <div class="flag-badges">${flagsHtml}</div>
        </div>
        ${titleHtml}
        <div class="manga-date-display">
          ${parseDayDisplay(m)}
          <div class="date-month-year">
            <span class="date-month">${t.ms[m.month-1]}</span>
            <span class="date-year">${m.year}</span>
          </div>
          <span class="badge-days">${lbl}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateHeaderDate(){
  document.getElementById('header-date-main').textContent=
    new Date().toLocaleDateString(lang==='id'?'id-ID':'en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

function pickLang(l) {
  document.getElementById('lang-picker').classList.add('hide');
  setLang(l);
}

// ================== CALENDAR ==================
let calDate = new Date();
calDate.setDate(1);
let calSelectedDay = null; // number (day) or 'awal' / 'tengah' / 'akhir'
let _calDayMap = {};
let _calEdgeMap = { awal: [], tengah: [], akhir: [] };

function mangaColor(days) {
  if (days < 0) return 'var(--past)';
  if (days === 0) return 'var(--today)';
  if (days <= 3) return 'var(--soon)';
  return 'var(--later)';
}

function openCalendar() {
  const now = new Date();
  calDate = new Date(now.getFullYear(), now.getMonth(), 1);
  calSelectedDay = null;
  renderCalendar();
  document.getElementById('calendar-modal').classList.add('show');
}

function closeCalendar() {
  document.getElementById('calendar-modal').classList.remove('show');
}

function navCalendar(delta) {
  calDate.setMonth(calDate.getMonth() + delta);
  calSelectedDay = null;
  renderCalendar();
}

function renderCalendar() {
  const t = T[lang];
  const y = calDate.getFullYear(), m = calDate.getMonth(); // 0-indexed

  document.getElementById('cal-title').textContent = `${t.ms[m]} ${y}`;
  document.getElementById('cal-weekdays').innerHTML = t.wd.map(w => `<div class="cal-weekday">${w}</div>`).join('');

  _calDayMap = {};
  _calEdgeMap = { awal: [], tengah: [], akhir: [] };

  MANGA_DATA.forEach(mg => {
    if ((mg.month - 1) === m && mg.year === y) {
      const sl = (mg.dayStr || '').toLowerCase();
      const days = daysUntil(mg);
      if (sl.includes('awal') || sl.includes('early')) {
        _calEdgeMap.awal.push({ mg, days });
        return;
      }
      if (sl.includes('tengah') || sl.includes('mid')) {
        _calEdgeMap.tengah.push({ mg, days });
        return;
      }
      if (sl.includes('akhir') || sl.includes('end')) {
        _calEdgeMap.akhir.push({ mg, days });
        return;
      }
      const dt = getApproxRange(mg).startDate;
      const day = dt.getDate();
      const isApprox = isNaN(parseInt(mg.dayStr));
      if (!_calDayMap[day]) _calDayMap[day] = [];
      _calDayMap[day].push({ mg, days, isApprox });
    }
  });

  const firstWeekday = new Date(y, m, 1).getDay();
  const totalDays = daysInMonth(m + 1, y);
  const now = new Date(); now.setHours(0,0,0,0);
  const isCurMonth = now.getFullYear() === y && now.getMonth() === m;
  const todayDate = now.getDate();

  const cells = [];
  // 1. Slot kosong awal bulan
  for (let i = 0; i < firstWeekday; i++) cells.push({ type: 'empty' });
  
  // 2. Tanggal kalender
  for (let d = 1; d <= totalDays; d++) cells.push({ type: 'day', d });

  // 3. Masukkan kotak-kotak Edge Marker (Awal, Tengah, Akhir)
  
  // Untuk "Awal", coba cari slot kosong di *depan* tanggal 1. Jika tidak ada, dorong ke belakang bersama yang lain.
  if (_calEdgeMap.awal.length) {
    let idx = -1;
    for (let i = 0; i < cells.length; i++) {
      if (cells[i].type === 'day') break;
      idx = i;
    }
    if (idx >= 0) cells[idx] = { type: 'edge', key: 'awal' };
    else cells.push({ type: 'edge', key: 'awal' }); // Jika hari ke-1 jatuh di hari Minggu (tidak ada sel kosong awal)
  }

  // "Tengah" selalu kita tumpuk rapi di belakang
  if (_calEdgeMap.tengah.length) {
    cells.push({ type: 'edge', key: 'tengah' });
  }

  // "Akhir" selalu kita tumpuk rapi di belakang
  if (_calEdgeMap.akhir.length) {
    cells.push({ type: 'edge', key: 'akhir' });
  }

  // Render HTML berdasarkan urutan sel
  let html = '';
  cells.forEach(cell => {
    if (cell.type === 'empty') html += `<div class="cal-day empty"></div>`;
    else if (cell.type === 'day') html += dayCellHtml(cell.d, t, isCurMonth, todayDate);
    else if (cell.type === 'edge') html += edgeCellHtml(cell.key, t, m, y);
  });

  // Tambahkan sel kosong ekstra supaya grid bagian paling bawahnya rapi (kelipatan 7)
  const remainder = cells.length % 7;
  if (remainder !== 0) {
    for (let i = 0; i < 7 - remainder; i++) html += `<div class="cal-day empty"></div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;

  document.getElementById('cal-legend').innerHTML = `
    <div class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--today)"></span>${t.s_today}</div>
    <div class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--soon)"></span>${t.s_soon}</div>
    <div class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--later)"></span>${t.s_later}</div>
    <div class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--past)"></span>${t.s_past}</div>
  `;

  renderDetail();
}

function dayCellHtml(d, t, isCurMonth, todayDate) {
  const items = _calDayMap[d];
  let cls = 'cal-day';
  if (isCurMonth && d === todayDate) cls += ' is-today';
  if (items) cls += ' has-manga';
  if (calSelectedDay === d && items) cls += ' selected';
  let dots = '';
  if (items) {
    dots = '<div class="cal-dots">' + items.map(it => {
      const c = mangaColor(it.days);
      const style = it.isApprox
        ? `background:transparent;border:1.5px solid ${c};`
        : `background:${c};`;
      return `<span class="cal-dot" style="${style}"></span>`;
    }).join('') + '</div>';
  }
  return `<div class="${cls}"${items ? ` onclick="showDayDetail(${d})"` : ''}>${d}${dots}</div>`;
}

function edgeDots(key) {
  return '<div class="cal-dots">' + _calEdgeMap[key].map(it =>
    `<span class="cal-dot" style="background:${mangaColor(it.days)};"></span>`
  ).join('') + '</div>';
}

function edgeCellHtml(key, t, monthIdx, year) {
  const lastDay = daysInMonth(monthIdx + 1, year);
  const label = key === 'awal' ? t.day_early : (key === 'tengah' ? t.day_mid : t.day_end);
  const rangeText = key === 'awal' ? '1-10' : (key === 'tengah' ? '11-19' : `20-${lastDay}`);
  const selectedCls = (calSelectedDay === key) ? ' selected' : '';
  return `<div class="cal-day cal-edge has-manga${selectedCls}" onclick="showEdgeDetail('${key}')">
    <div class="cal-edge-label">${escHtml(label)}<br><span style="font-size:7.5px; opacity:0.8; margin-top:2px; display:block;">${rangeText}</span></div>${edgeDots(key)}
  </div>`;
}

function showDayDetail(d) {
  calSelectedDay = (calSelectedDay === d) ? null : d;
  renderCalendar();
}

function showEdgeDetail(key) {
  calSelectedDay = (calSelectedDay === key) ? null : key;
  renderCalendar();
}

function renderDetail() {
  const t = T[lang];
  const detailEl = document.getElementById('cal-detail');

  let items, dateStr;
  if (calSelectedDay === 'awal' || calSelectedDay === 'tengah' || calSelectedDay === 'akhir') {
    items = _calEdgeMap[calSelectedDay];
    const lastDay = daysInMonth(calDate.getMonth() + 1, calDate.getFullYear());
    const label = calSelectedDay === 'awal' ? t.day_early : (calSelectedDay === 'tengah' ? t.day_mid : t.day_end);
    const rangeText = calSelectedDay === 'awal' ? '(1-10)' : (calSelectedDay === 'tengah' ? '(11-19)' : `(20-${lastDay})`);
    dateStr = `${label} <span style="font-size:12px; opacity:0.8">${rangeText}</span> ${t.ms[calDate.getMonth()]} ${calDate.getFullYear()}`;
  } else if (typeof calSelectedDay === 'number' && _calDayMap[calSelectedDay]) {
    items = _calDayMap[calSelectedDay];
    dateStr = `${calSelectedDay} ${t.ms[calDate.getMonth()]} ${calDate.getFullYear()}`;
  } else {
    detailEl.classList.remove('show');
    detailEl.innerHTML = '';
    return;
  }

  detailEl.classList.add('show');
  detailEl.innerHTML = `<div class="cal-detail-date">${dateStr}</div>` + items.map(it => {
    const mg = it.mg;
    const c = mangaColor(it.days);
    const flagsHtml = (mg.flags || ['id']).map(f => `<span class="flag-badge ${f}">${f === 'id' ? 'IDN' : 'ENG'}</span>`).join('');
    const titleHtml = mg.link
      ? `<a href="${escHtml(mg.link)}" target="_blank" rel="noopener">${escHtml(mg.title)} ↗</a>`
      : `<span class="no-link">${escHtml(mg.title)}</span>`;
    const approxNote = it.isApprox ? `<div class="cal-detail-approx">(${t.cal_approx} — ${escHtml(translateDayStr(mg.dayStr, mg))})</div>` : '';
    return `<div class="cal-detail-item" style="border-left:3px solid ${c};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div>${titleHtml}${approxNote}</div>
        <div class="flag-badges" style="flex-shrink:0;">${flagsHtml}</div>
      </div>
    </div>`;
  }).join('');
}
</script>
